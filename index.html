<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Timetable ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-suhani">

  <!-- Floating background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <!-- Profile Switcher -->
  <div class="profile-switcher-wrapper">
    <div class="profile-switcher">
      <button class="profile-btn active" id="btn-suhani" onclick="switchProfile('suhani', this)">
        <img src="https://i.pinimg.com/564x/02/a9/55/02a9551d5605cfb4a3f2ae976905f09e.jpg" class="profile-avatar" alt="Suhani">
        <span>Suhani</span>
      </button>
      <button class="profile-btn" id="btn-laksh" onclick="switchProfile('laksh', this)">
        <img src="https://i.pinimg.com/originals/f4/2a/f1/f42af16ba580f84430d39a5838ad0c70.jpg" class="profile-avatar" alt="Laksh">
        <span>Laksh</span>
      </button>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="shinchan-header">
        <img id="header-avatar" src="https://i.pinimg.com/564x/02/a9/55/02a9551d5605cfb4a3f2ae976905f09e.jpg" alt="avatar" class="shinchan-wave">
      </div>
      <div class="header-text">
        <p class="header-sub">Crayon Shin-chan presents</p>
        <h1 class="header-title" id="header-title">Suhani's<br>Timetable</h1>
      </div>
      <div class="header-deco">📅</div>
    </div>
  </header>

  <!-- Who's Busy Now -->
  <div class="busy-section" id="busySection">
    <div class="busy-header">Who's busy right now?</div>
    <div class="busy-status-row">
      <div class="busy-person" id="busySuhani">
        <span class="busy-name">Suhani</span>
        <span class="busy-indicator" id="indicatorSuhani">🟢 Free</span>
      </div>
      <div class="busy-divider">·</div>
      <div class="busy-person" id="busyLaksh">
        <span class="busy-name">Laksh</span>
        <span class="busy-indicator" id="indicatorLaksh">🟢 Free</span>
      </div>
    </div>
    <div class="busy-summary" id="busySummary"></div>
  </div>

  <!-- Day Tabs -->
  <div class="tabs-wrapper">
    <div class="tabs" id="tabs">
      <button onclick="showDay('mon', this)" data-day="mon">Mon</button>
      <button onclick="showDay('tue', this)" data-day="tue">Tue</button>
      <button onclick="showDay('wed', this)" data-day="wed">Wed</button>
      <button onclick="showDay('thu', this)" data-day="thu">Thu</button>
      <button onclick="showDay('fri', this)" data-day="fri">Fri</button>
      <button onclick="showDay('sat', this)" data-day="sat">Sat</button>
    </div>
  </div>

  <!-- Schedule -->
  <main>
    <div id="schedule"></div>
  </main>

  <!-- Bottom Popup -->
  <div id="nextClassPopup" class="popup">
    <div class="popup-inner">
      <span class="popup-icon">⏳</span>
      <span class="popup-text">Calculating...</span>
    </div>
  </div>

  <!-- Peeking character (bottom corner) -->
  <div class="shinchan-peek" id="peekChar">
    <img id="peekImg" src="https://media.tenor.com/YYkyc0OvkG0AAAAC/shinchan-anime.gif" alt="peeking character">
  </div>

  <script src="script.js"></script>
</body>
</html>
